name: Deploy Example

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ${{ inputs.environment }}
        run: |
          curl -sf -X POST ${{ vars.AGENT_URL }}/execute \
            -H "Authorization: Bearer ${{ secrets.AGENT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "Deploy ${{ github.repository }} to ${{ inputs.environment }}",
              "workingDir": "/opt/app",
              "steps": [
                {
                  "name": "Pull latest",
                  "run": "git pull origin main"
                },
                {
                  "name": "Install dependencies",
                  "run": "npm install --production"
                },
                {
                  "name": "Restart service",
                  "run": "sudo systemctl restart myapp"
                },
                {
                  "name": "Health check",
                  "run": "sleep 5 && curl -f http://localhost:3000/health"
                }
              ],
              "timeout": 300
            }'
