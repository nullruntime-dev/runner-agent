server:
  port: 8090

agent:
  token: ${AGENT_TOKEN}
  working-dir: /tmp
  default-shell: /bin/sh
  max-concurrent: 5

spring:
  datasource:
    url: jdbc:h2:file:./agent-data
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
